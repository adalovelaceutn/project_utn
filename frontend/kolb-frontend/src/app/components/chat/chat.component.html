<mat-card>
  <mat-card-header>
    <mat-card-title>Chat</mat-card-title>
    <mat-card-subtitle>Asistente de orientacion Kolb</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="chat-content">
    <div #chatWindow class="chat-window">
      <div class="message" *ngFor="let message of messages" [class.user]="message.role === 'user'">
        <span class="bubble-role">{{ message.role === 'user' ? 'Tu' : 'Qolby' }}</span>
        <span class="bubble-text">{{ message.text }}</span>
      </div>
    </div>

    <form class="chat-form" [formGroup]="form" (ngSubmit)="sendMessage()">
      <mat-form-field appearance="outline">
        <mat-label>Escribe un mensaje</mat-label>
        <input matInput formControlName="message" [disabled]="loading" />
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'Enviar' }}
      </button>
    </form>
  </mat-card-content>
</mat-card>
